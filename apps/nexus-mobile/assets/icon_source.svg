<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Space Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
    
    <!-- Neon Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="200" y1="200" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    
    <!-- Electric Violet Gradient -->
    <linearGradient id="violetGrad" x1="200" y1="824" x2="824" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    
    <!-- Ambient Neon Glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur3" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur3" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glassmorphism Drop Shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Dark Rounded App Icon Base -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>
  
  <!-- Subtle Internal Glow Ring -->
  <rect x="24" y="24" width="976" height="976" rx="200" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="4"/>

  <!-- The Nexus "N" Intersection Geometry -->
  <g filter="url(#dropShadow)">
    <!-- Cyan Slash -->
    <path d="M280 280H440L744 744H584Z" fill="url(#cyanGrad)" filter="url(#neonGlow)"/>
    <!-- Violet Slash -->
    <path d="M280 744H440L744 280H584Z" fill="url(#violetGrad)" filter="url(#neonGlow)"/>
  </g>
  
  <!-- The Nexus Core (Center Orb) -->
  <circle cx="512" cy="512" r="90" fill="#0A0A0A" filter="url(#dropShadow)"/>
  <circle cx="512" cy="512" r="90" fill="none" stroke="#00FFFF" stroke-width="16" filter="url(#neonGlow)"/>
  <circle cx="512" cy="512" r="40" fill="#FFFFFF" filter="url(#neonGlow)"/>
</svg>
